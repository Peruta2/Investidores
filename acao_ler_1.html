<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotações Brapi</title>
  <style>
    .ticker-container {
      display: flex;
      gap: 20px;
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .ticker-box {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background-color: #f9f9f9;
    }
    .ativo-ticker {
      font-weight: bold;
      color: #333;
      background: #e0e0e0;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .preco-ativo {
      font-size: 1.1em;
      color: #007bff;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="ticker-container">
    <div class="ticker-box">
      <div class="ativo-ticker">BBDC4</div>
      <div class="preco-ativo">Carregando...</div>
    </div>
    <div class="ticker-box">
      <div class="ativo-ticker">PETR4</div>
      <div class="preco-ativo">Carregando...</div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const token = "qkS8x7ANGCoBa7msaGY8Vn";
      const boxes = document.querySelectorAll(".ticker-box");

      boxes.forEach(box => {
        const tickerElement = box.querySelector(".ativo-ticker");
        const precoElement = box.querySelector(".preco-ativo");
        
        const ticker = tickerElement.textContent.trim();
        const url = `https://brapi.dev{ticker}?token=${token}`;

        fetch(url)
          .then(response => {
            if (!response.ok) throw new Error("Erro na requisição");
            return response.json();
          })
          .then(data => {
            // CORREÇÃO DA SINTAXE: data.results[0] com colchetes
            if (data && data.results && data.results[0]) {
              const preco = data.results[0].regularMarketPrice;
              
              precoElement.textContent = preco.toLocaleString("pt-BR", {
                style: "currency",
                currency: "BRL"
              });
            } else {
              precoElement.textContent = "Não encontrado";
            }
          })
          .catch(error => {
            console.error("Erro:", error);
            precoElement.textContent = "Erro";
          });
      });
    });
  </script>

</body>
</html>
